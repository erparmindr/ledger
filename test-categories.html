<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories Test</title>
<link rel="stylesheet" href="./css/styles.css?v=62">
<style>
  body { background:var(--bg); color:var(--text); font-family:var(--font-sans); padding:24px; max-width:700px; margin:0 auto; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }

<body>
<div class="card card-pad">
  <div class="cat-page-head">
    <h2 class="cat-page-title">Categories</h2>
  </div>
  <div class="type-pills cat-tabs">
    <button class="type-pill active">− Expense <span class="tab-count">(10)</span></button>
    <button class="type-pill">+ Income <span class="tab-count">(3)</span></button>
    <button class="type-pill">⇄ Transfer <span class="tab-count">(4)</span></button>
  </div>

            <span class="cat-card-stat">24 txs</span>
            <span class="cat-card-stat">5 subs</span>
          </div>
        </div>
        <div class="cat-card-actions">
          <button class="icon-btn sm"><i data-lucide="plus"></i></button>
          <button class="icon-btn sm"><i data-lucide="pencil"></i></button>

        </div>
      </div>
      <div class="cat-card-subs">

          <span class="cat-card-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
        </div>
        <div class="cat-card-sub-list">
          <div class="cat-card-sub"><span class="cat-card-sub-name">Restaurants</span><span class="cat-card-sub-count">12</span><span class="cat-card-sub-actions"><button class="icon-btn sm"><i data-lucide="pencil"></i></button><button class="icon-btn sm danger"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span></div>

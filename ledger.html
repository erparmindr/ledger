/* ============================================================
   CSV IMPORT MODAL
   ============================================================ */
function parseCsv(text){
  var rows = [];
  var cur = "", row = [], inQuotes = false;
  for(var i=0;i<text.length;i++){
    var ch = text[i];
    if(inQuotes){
      if(ch === '"'){ if(text[i+1] === '"'){ cur+='"'; i++; } else inQuotes=false; }
      else cur += ch;
    } else {
      if(ch === '"') inQuotes = true;
      else if(ch === ','){ row.push(cur); cur=""; }
      else if(ch === '\n'){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(ch === '\r'){ /* skip */ }
      else cur += ch;
    }
  }
  if(cur.length || row.length){ row.push(cur); rows.push(row); }
  return rows.filter(function(r){ return r.length > 1 || (r.length===1 && r[0].trim()!==""); });
}

function openCsvImportModal(file){
  var reader = new FileReader();
  reader.onload = function(e){
    var rows = parseCsv(e.target.result);
    if(rows.length < 1){ showToast("Couldn't find any rows in that file"); return; }

    // Detect whether first row is a header or data
    // A row is a header if its first cell doesn't look like a date or number
    function looksLikeDate(s){ return /^\d{4}-\d{2}-\d{2}/.test(s) || /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/.test(s); }
    function looksLikeNumber(s){ return /^[\d,.\-\$\(\)]+$/.test(s.trim()) && s.trim().length > 0; }
    var firstCell = (rows[0][0]||"").trim();
    var hasHeader = !looksLikeDate(firstCell) && !looksLikeNumber(firstCell);

    var headers, dataRows, allDataRows;
    if(hasHeader){
      headers = rows[0];
      allDataRows = rows.slice(1);
      dataRows = allDataRows.slice(0, 8);
    } else {
      // No header — generate positional labels
      var ncols = rows[0].length;
      headers = [];
      for(var ci=0; ci<ncols; ci++) headers.push("Column " + (ci+1));
      allDataRows = rows;
      dataRows = rows.slice(0, 8);
    }

    // Auto-detect TD bank format: ISO date, description, debit (or empty), credit (or empty), balance
    // Signature: 5 cols, col0 = YYYY-MM-DD date, col2 & col3 are numeric/empty, col4 looks like running balance
    function isTDCSV(){
      if(rows[0].length < 4) return false;
      var sample = hasHeader ? rows.slice(1,4) : rows.slice(0,4);
      var tdRows = 0;
      sample.forEach(function(r){
        if(r.length >= 4 && looksLikeDate((r[0]||"").trim())){
          var col2 = (r[2]||"").trim(), col3 = (r[3]||"").trim();
          if((col2===""||looksLikeNumber(col2)) && (col3===""||looksLikeNumber(col3))) tdRows++;
        }
      });
      return tdRows >= Math.min(2, sample.length);
    }

    var tdFormat = isTDCSV();

    var accOpts = DB.accounts.map(function(a){ return '<option value="'+a.id+'">'+escapeHtml(a.name)+'</option>'; }).join("");
    var headerOpts = '<option value="">Skip / not present</option>' + headers.map(function(h,i){ return '<option value="'+i+'">'+escapeHtml(h)+'</option>'; }).join("");

    function autoDetect(keywords){
      var found = "";
      headers.forEach(function(h,i){
        var hl = h.toLowerCase().replace(/[^a-z0-9]/g," ");
        keywords.forEach(function(k){
          var re = new RegExp("(^|\\s)" + k + "(\\s|$)");
          if(re.test(hl) && found === "") found = String(i);
        });
      });
      return found;
    }

    var guessDate, guessDesc, guessAmt, guessDr, guessCr, defaultSplit;

    if(tdFormat){
      // TD: date=0, desc=1, debit=2, credit=3, balance=4 (skip)
      guessDate = "0"; guessDesc = "1"; guessDr = "2"; guessCr = "3"; guessAmt = ""; defaultSplit = true;
    } else {
      guessDate = autoDetect(["date","posted","trans"]);
      guessDesc = autoDetect(["desc","narr","memo","particular","detail","ref","particulars"]);
      guessAmt  = autoDetect(["amount","amt"]);
      guessDr   = autoDetect(["debit","dr","withdrawal","withdrawals","withdraw","out"]);
      guessCr   = autoDetect(["credit","cr","deposit","deposits","in"]);
      defaultSplit = (guessDr !== "" || guessCr !== "");
    }

    function selOpts(guess){
      return '<option value="">Skip / not present</option>' + headers.map(function(h,i){
        return '<option value="'+i+'" '+(String(i)===guess?'selected':'')+'>'+escapeHtml(h)+'</option>';
      }).join("");
    }

    var previewHtml = '<table style="width:100%; font-size:11px; border-collapse:collapse;"><tr>'
      + headers.map(function(h){ return '<th style="text-align:left; padding:4px 8px; border-bottom:1px solid var(--border); color:var(--text-dim); white-space:nowrap;">'+escapeHtml(h)+'</th>'; }).join("")
      + '</tr>' + dataRows.map(function(r){
        return '<tr>' + r.map(function(c){ return '<td style="padding:4px 8px; border-bottom:1px solid var(--border-soft); white-space:nowrap;">'+escapeHtml(c)+'</td>'; }).join("") + '</tr>';
      }).join("") + '</table>';

    var tdBadge = tdFormat ? '<span style="background:var(--sage-soft);color:var(--sage);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;">TD Bank detected</span>' : '';

    var html = ''
      + '<div class="modal-head"><h3>Import CSV &middot; map columns' + tdBadge + '</h3><button class="icon-btn" id="closeModalBtn" aria-label="Close">&times;</button></div>'
      + '<div class="modal-body">'
      + '  <div style="overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius); max-height:140px;">' + previewHtml + '</div>'
      + (tdFormat ? '<p class="faint" style="font-size:11.5px; margin:0;">TD bank format detected automatically &mdash; columns pre-mapped. Just pick your account and import.</p>' : '')
      + '  <div style="display:flex; gap:8px; align-items:center;">'
      + '    <span class="faint" style="font-size:11.5px; font-weight:700;">Amount format:</span>'
      + '    <div class="toggle-pair">'
      + '      <button type="button" id="modeSignedBtn" class="' + (!defaultSplit ? 'active' : '') + '">Single column (signed)</button>'
      + '      <button type="button" id="modeSplitBtn" class="' + (defaultSplit ? 'active' : '') + '">Debit &amp; credit columns</button>'
      + '    </div>'
      + '  </div>'
      + '  <div class="form-row">'
      + '    <div class="field"><label>Date column</label><select id="mapDate">' + selOpts(guessDate) + '</select></div>'
      + '    <div class="field"><label>Description column</label><select id="mapDesc">' + selOpts(guessDesc) + '</select></div>'
      + '  </div>'
      + '  <div id="signedRow" class="form-row" style="display:' + (!defaultSplit ? 'flex' : 'none') + ';">'
      + '    <div class="field"><label>Amount column <span class="faint">(negative = expense)</span></label><select id="mapAmount">' + selOpts(guessAmt) + '</select></div>'
      + '  </div>'
      + '  <div id="splitRow" class="form-row" style="display:' + (defaultSplit ? 'flex' : 'none') + ';">'
      + '    <div class="field"><label>Debit column <span class="faint">(money out)</span></label><select id="mapDebit">' + selOpts(guessDr) + '</select></div>'
      + '    <div class="field"><label>Credit column <span class="faint">(money in)</span></label><select id="mapCredit">' + selOpts(guessCr) + '</select></div>'
      + '  </div>'
      + '  <div class="field"><label>Import into account</label><select id="mapAccount">' + accOpts + '</select></div>'
      + '  <p class="faint" style="font-size:11.5px; margin:0;">Rows where amount is 0 or unreadable are skipped. You can edit any entry afterward.</p>'
      + '</div>'
      + '<div class="modal-foot"><button class="btn" id="cancelBtn">Cancel</button><button class="btn btn-primary" id="doImportBtn">Import</button></div>';

    openModal(html, function(){
      document.getElementById("closeModalBtn").addEventListener("click", closeModal);
      document.getElementById("cancelBtn").addEventListener("click", closeModal);

      var isSplitMode = defaultSplit;
      document.getElementById("modeSignedBtn").addEventListener("click", function(){
        isSplitMode = false;
        document.getElementById("modeSignedBtn").classList.add("active");
        document.getElementById("modeSplitBtn").classList.remove("active");
        document.getElementById("signedRow").style.display = "flex";
        document.getElementById("splitRow").style.display = "none";
      });
      document.getElementById("modeSplitBtn").addEventListener("click", function(){
        isSplitMode = true;
        document.getElementById("modeSplitBtn").classList.add("active");
        document.getElementById("modeSignedBtn").classList.remove("active");
        document.getElementById("signedRow").style.display = "none";
        document.getElementById("splitRow").style.display = "flex";
      });

      document.getElementById("doImportBtn").addEventListener("click", function(){
        var dateIdx = document.getElementById("mapDate").value;
        var descIdx = document.getElementById("mapDesc").value;
        var account = document.getElementById("mapAccount").value;
        if(dateIdx === ""){ showToast("Map the Date column"); return; }
        if(!account){ showToast("Choose an account to import into"); return; }

        var amtIdx, drIdx, crIdx;
        if(!isSplitMode){
          amtIdx = document.getElementById("mapAmount").value;
          if(amtIdx === ""){ showToast("Map the Amount column"); return; }
        } else {
          drIdx = document.getElementById("mapDebit").value;
          crIdx = document.getElementById("mapCredit").value;
          if(drIdx === "" && crIdx === ""){ showToast("Map at least one of Debit or Credit column"); return; }
        }

        // Parse into preview rows instead of committing directly
        var parsedRows = [];
        allDataRows.forEach(function(r){
          var rawDate = (r[dateIdx]||"").trim();
          var isoDate = normalizeDate(rawDate);
          if(!isoDate) return;

          var amt, type;
          if(!isSplitMode){
            var rawAmt = (r[amtIdx]||"").replace(/[^0-9.\-]/g,"");
            amt = parseFloat(rawAmt);
            if(isNaN(amt) || amt === 0) return;
            type = amt < 0 ? "expense" : "income";
            amt = Math.abs(amt);
          } else {
            var rawDr = drIdx !== "" ? (r[drIdx]||"").replace(/[^0-9.]/g,"") : "";
            var rawCr = crIdx !== "" ? (r[crIdx]||"").replace(/[^0-9.]/g,"") : "";
            var drAmt = rawDr ? parseFloat(rawDr) : 0;
            var crAmt = rawCr ? parseFloat(rawCr) : 0;
            if(isNaN(drAmt)) drAmt = 0;
            if(isNaN(crAmt)) crAmt = 0;
            if(drAmt > 0 && crAmt === 0){ type = "expense"; amt = drAmt; }
            else if(crAmt > 0 && drAmt === 0){ type = "income"; amt = crAmt; }
            else if(drAmt > 0 && crAmt > 0){ type = drAmt >= crAmt ? "expense" : "income"; amt = Math.max(drAmt, crAmt); }
            else return;
          }

          var desc = descIdx !== "" ? ((r[descIdx]||"").trim() || "Imported transaction") : "Imported transaction";
          parsedRows.push({ date: isoDate, amount: amt, type: type, desc: desc, raw: r.join(", ") });
        });

        if(parsedRows.length === 0){ showToast("No valid rows found — check your column mapping"); return; }
        openImportPreviewModal(parsedRows, account, "CSV");
      });
    });
  };
  reader.readAsText(file);
}


function normalizeDate(raw){
  raw = raw.trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0,10);
  var m = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){
    var a=parseInt(m[1],10), b=parseInt(m[2],10), y=m[3];
    if(y.length===2) y = "20"+y;
    var mm = a>12 ? b : a;
    var dd = a>12 ? a : b;
    return y + "-" + pad2(mm) + "-" + pad2(dd);
  }
  var d = new Date(raw);
  if(!isNaN(d.getTime())) return todayISOFromDate(d);
  return null;
}
function todayISOFromDate(d){
  return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
}

/* ============================================================
   PASTED STATEMENT TEXT PARSER (for PDF bank statements)
   ============================================================ */
// Matches common date formats appearing in statement lines:
// 01/15/2026, 1/15/26, 2026-01-15, Jan 15 2026, Jan 15, 2026, 15 Jan 2026
var STMT_DATE_RE = /(\d{4}-\d{2}-\d{2})|(\d{1,2}\/\d{1,2}\/\d{2,4})|([A-Za-z]{3,9}\.?\s+\d{1,2},?\s+\d{4})|(\d{1,2}\s+[A-Za-z]{3,9}\.?,?\s+\d{4})/;
// Matches a trailing money amount: optional $ / parentheses / minus sign, digits with optional thousands separators and decimals
var STMT_AMOUNT_RE = /(-?\(?\$?-?[\d,]+\.\d{2}\)?)\s*$/;
// TD-style compact date: Mon## (e.g. May24, Jun10, Jan3)
var TD_DATE_RE = /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)(\d{1,2})\s+/i;
// TD-style amount at end: may be glued to text like "ON-33.78" or "THANKYOU-1,000.00" or just " 44.67"
var TD_AMOUNT_RE = /(-?[\d,]+\.\d{2})\s*$/;
var MONTH_MAP = {jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};

function parseTDDate(mon, day){
  var mm = MONTH_MAP[mon.toLowerCase().slice(0,3)];
  if(!mm) return null;
  var now = new Date();
  var year = now.getFullYear();
  // If month is in the future (e.g. Dec in Jan), assume previous year
  if(parseInt(mm,10) > now.getMonth()+1) year--;
  return year + "-" + mm + "-" + (day.length<2?"0"+day:day);
}

function isTDFormat(text){
  var lines = text.trim().split(/\r?\n/);
  var matched = 0;
  lines.slice(0,5).forEach(function(l){ if(TD_DATE_RE.test(l.trim())) matched++; });
  return matched >= 1;
}

function parseStatementText(text){
  var lines = text.split(/\r?\n/);
  var results = [];

  // Detect TD format: lines starting with two compact dates like "May24 May26 MERCHANT..."
  if(isTDFormat(text)){
    lines.forEach(function(rawLine, idx){
      var line = rawLine.trim();
      if(!line) return;
      var dm = line.match(TD_DATE_RE);
      if(!dm) return;
      // Use the posting date (second date) for the transaction
      var isoDate = parseTDDate(dm[3], dm[4]);
      if(!isoDate) return;
      // Strip the two dates from the start
      var rest = line.replace(TD_DATE_RE, "").trim();
      // Find the amount at the end — may be glued to text with no space (e.g. "ON-33.78")
      var amtMatch = rest.match(TD_AMOUNT_RE);
      if(!amtMatch) return;
      var amtRaw = amtMatch[1].replace(/,/g,"");
      var amt = parseFloat(amtRaw);
      if(isNaN(amt)) return;
      // Description: strip the trailing amount (and anything glued to it like "ON")
      var desc = rest.replace(TD_AMOUNT_RE,"").replace(/\s+[A-Z]{2}\s*$/, "").trim();
      // Also strip trailing province codes (2 uppercase letters) left over
      desc = desc.replace(/\s+[A-Z]{2}$/, "").trim();
      if(!desc) desc = "Imported transaction";
      results.push({ lineNumber:idx+1, raw:line, date:isoDate, amount:amt, desc:desc });
    });
    return results;
  }

  // General format (existing logic)
  lines.forEach(function(rawLine, idx){
    var line = rawLine.trim();
    if(!line) return;
    var dateMatch = line.match(STMT_DATE_RE);
    if(!dateMatch) return;
    var amtMatch = line.match(STMT_AMOUNT_RE);
    if(!amtMatch) return;
    var dateStr = dateMatch[0];
    var isoDate = normalizeDate(dateStr);
    if(!isoDate) return;
    var amtRaw = amtMatch[1];
    var isParenNegative = /^\(.*\)$/.test(amtRaw);
    var cleaned = amtRaw.replace(/[()$,]/g, "");
    var amt = parseFloat(cleaned);
    if(isNaN(amt)) return;
    if(isParenNegative) amt = -Math.abs(amt);
    var desc = line
      .replace(dateStr, "")
      .replace(amtMatch[0], "")
      .replace(/\s{2,}/g, " ")
      .replace(/^[\s\-:|,]+|[\s\-:|,]+$/g, "")
      .trim();
    if(!desc) desc = "Imported transaction";
    results.push({ lineNumber:idx+1, raw:line, date:isoDate, amount:amt, desc:desc });
  });
  return results;
}

function openImportPreviewModal(parsedRows, preselectedAccount, source, onBack){

  var tdStyle = 'padding:6px 8px; border-bottom:1px solid var(--border-soft); vertical-align:middle;';

  function catOptsFor(forType, selectedId){
    var relevant = DB.categories.filter(function(c){ return c.type === forType; });
    return '<option value="">Choose category&hellip;</option>' + relevant.map(function(c){
      return '<option value="'+c.id+'" '+(c.id===selectedId?'selected':'')+'>'+escapeHtml(c.name)+'</option>';
    }).join("");
  }

  // Pre-compute a suggested category for each row up front
  parsedRows.forEach(function(r){
    if(r.suggestedCategoryId === undefined){
      var forType = r.type || (r.amount < 0 ? "expense" : "income");
      r.suggestedCategoryId = suggestCategoryForDescription(r.desc, forType) || "";
    }
  });

  var rowsHtml = parsedRows.map(function(r, i){
    var preType = r.type || (r.amount < 0 ? "expense" : "income");
    return '<tr id="prev-row-'+i+'">'
      + '<td style="'+tdStyle+' text-align:center; width:32px;">'
      + '  <input type="checkbox" class="prev-chk" data-idx="'+i+'" checked style="width:15px;height:15px;cursor:pointer;">'
      + '</td>'
      + '<td style="'+tdStyle+' white-space:nowrap; font-size:12px;">'+r.date+'</td>'
      + '<td style="'+tdStyle+'">'
      + '  <input type="text" class="prev-desc" data-idx="'+i+'" value="'+escapeHtml(r.desc)+'" style="width:100%; min-width:150px; background:transparent; border:none; border-bottom:1px solid var(--border-soft); padding:3px 4px; font-size:12.5px; color:var(--text);" title="Click to edit">'
      + '</td>'
      + '<td style="'+tdStyle+' text-align:right; font-weight:700; font-size:13px; white-space:nowrap; font-variant-numeric:tabular-nums;">'
      + fmtMoney(Math.abs(r.amount))
      + '</td>'
      + '<td style="'+tdStyle+'">'
      + '  <select class="prev-type" data-idx="'+i+'" style="font-size:11.5px; padding:5px 7px; border-radius:8px; border:1px solid var(--border); background:var(--surface-2); color:var(--text);">'
      + '    <option value="expense" '+(preType==="expense"?"selected":"")+'>Expense</option>'
      + '    <option value="income" '+(preType==="income"?"selected":"")+'>Income</option>'
      + '    <option value="transfer" '+(preType==="transfer"?"selected":"")+'>Transfer</option>'
      + '  </select>'
      + '</td>'
      + '<td style="'+tdStyle+'">'
      + '  <select class="prev-category" data-idx="'+i+'" style="font-size:11.5px; padding:5px 7px; border-radius:8px; border:1px solid ' + (r.suggestedCategoryId ? 'var(--sage)' : 'var(--clay)') + '; background:var(--surface-2); color:var(--text);">'
      + catOptsFor(preType, r.suggestedCategoryId)
      + '  </select>'
      + '</td>'
      + '</tr>';
  }).join("");

  var html = ''
    + '<div class="modal-head">'
    + '  <h3>Review '+parsedRows.length+' transaction'+(parsedRows.length===1?"":"s")+' <span class="faint" style="font-size:12px; font-weight:500;">from '+escapeHtml(source||"import")+'</span></h3>'
    + '  <button class="icon-btn" id="closeModalBtn" aria-label="Close">&times;</button>'
    + '</div>'
    + '<div class="modal-body">'
    + '  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">'
    + '    <p class="faint" style="font-size:11.5px; margin:0;">Edit descriptions, flip types, uncheck rows to skip. Categories are auto-suggested &mdash; a category is required for every checked row.</p>'
    + '    <div style="display:flex; gap:8px;">'
    + '      <button class="btn btn-sm" id="selectAllBtn">Check all</button>'
    + '      <button class="btn btn-sm" id="deselectAllBtn">Uncheck all</button>'
    + '    </div>'
    + '  </div>'
    + '  <div style="overflow:auto; max-height:360px; border:1px solid var(--border); border-radius:var(--radius);">'
    + '    <table style="width:100%; border-collapse:collapse;">'
    + '      <tr>'
    + '        <th style="'+thStyle+'"></th>'
    + '        <th style="'+thStyle+'">Date</th>'
    + '        <th style="'+thStyle+'">Description</th>'
    + '        <th style="'+thStyle+' text-align:right;">Amount</th>'
    + '        <th style="'+thStyle+'">Type</th>'
    + '        <th style="'+thStyle+'">Category</th>'
    + '      </tr>'
    + rowsHtml
    + '    </table>'
    + '  </div>'
    + '  <div class="field"><label>Import into account</label><select id="prevAccount">'+accOpts+'</select></div>'
    + '</div>'
    + '<div class="modal-foot">'
    + (onBack ? '<button class="btn" id="backBtn">Back</button>' : '<button class="btn" id="cancelImportBtn">Cancel</button>')
    + '  <button class="btn btn-primary" id="confirmImportBtn">Import checked rows</button>'
    + '</div>';

  openModal(html, function(){
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    var cancelBtn = document.getElementById("cancelImportBtn");
    if(cancelBtn) cancelBtn.addEventListener("click", closeModal);
    var backBtn = document.getElementById("backBtn");
    if(backBtn) backBtn.addEventListener("click", function(){ closeModal(); if(onBack) onBack(); });
    document.getElementById("selectAllBtn").addEventListener("click", function(){
      Array.prototype.forEach.call(document.querySelectorAll(".prev-chk"), function(c){ c.checked = true; });
    });
    document.getElementById("deselectAllBtn").addEventListener("click", function(){
      Array.prototype.forEach.call(document.querySelectorAll(".prev-chk"), function(c){ c.checked = false; });
    });

    // When type changes, refresh that row's category list to the new type's categories
    Array.prototype.forEach.call(document.querySelectorAll(".prev-type"), function(sel){
      sel.addEventListener("change", function(){
        var idx = parseInt(sel.getAttribute("data-idx"), 10);
        var catSel = document.querySelector('.prev-category[data-idx="'+idx+'"]');
        if(catSel){
          var suggestion = suggestCategoryForDescription(parsedRows[idx].desc, sel.value) || "";
          catSel.innerHTML = catOptsFor(sel.value, suggestion);
          catSel.style.borderColor = suggestion ? "var(--sage)" : "var(--clay)";
        }
      });
    });
    // Clear the red/green border hint once the user actively picks something
    Array.prototype.forEach.call(document.querySelectorAll(".prev-category"), function(sel){
      sel.addEventListener("change", function(){
        sel.style.borderColor = sel.value ? "var(--sage)" : "var(--clay)";
      });
    });

    document.getElementById("confirmImportBtn").addEventListener("click", function(){
      var account = document.getElementById("prevAccount").value;
      if(!account){ showToast("Choose an account"); return; }
      var checks = document.querySelectorAll(".prev-chk");
      var descs  = document.querySelectorAll(".prev-desc");
      var types  = document.querySelectorAll(".prev-type");
      var cats   = document.querySelectorAll(".prev-category");

      // Validate: every checked row must have a category before anything imports
      var missing = [];
      Array.prototype.forEach.call(checks, function(chk, i){
        if(chk.checked && !cats[i].value) missing.push(i+1);
      });
      if(missing.length){
        showToast("Pick a category for row" + (missing.length===1?"":"s") + " " + missing.join(", ") + " (or uncheck to skip)");
        return;
      }

      var imported = 0;
      Array.prototype.forEach.call(checks, function(chk, i){
        if(!chk.checked) return;
        var r = parsedRows[i];
        var chosenType = types[i].value;
        var chosenDesc = descs[i].value.trim() || r.desc || "Imported transaction";
        var chosenCategory = cats[i].value;
        DB.transactions.push({
          id: uid(), type: chosenType, date: r.date, amount: Math.abs(r.amount),
          desc: chosenDesc, notes: "Imported from " + (source||"import"),
          account: account, category: chosenCategory, subcategory: "", created: Date.now()
        });
        // Learn from this categorization for smarter future suggestions
        if(chosenType !== "transfer") learnCategoryMapping(chosenDesc, chosenCategory);
        imported++;
      });
      saveData();
      closeModal();
      showToast(imported + " transaction"+(imported===1?"":"s")+" imported");
      renderPage();
    });
  });
}

/* ============================================================
   BACKUP EXPORT / IMPORT
   ============================================================ */
function exportBackup(){
  var blob = new Blob([JSON.stringify(DB, null, 2)], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "ledger-backup-" + todayISO() + ".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Backup downloaded");
}

function importBackupFile(file){
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var parsed = JSON.parse(e.target.result);
      if(!parsed.accounts || !parsed.transactions){ showToast("That doesn't look like a valid backup file"); return; }
      openConfirmModal("Restore backup?", "This will replace all current data in this browser with the contents of the backup file. This can't be undone. Continue?", function(){
        DB.accounts = parsed.accounts || [];
        DB.people = parsed.people || [];
        DB.transactions = parsed.transactions || [];
        DB.categories = parsed.categories || defaultCategories();
        DB.recurring = parsed.recurring || [];
        DB.importMappings = parsed.importMappings || {};
        DB.debtItems = parsed.debtItems || [];
        DB.categoryLearning = parsed.categoryLearning || {};
        saveData();
        showToast("Backup restored");
        renderPage();
      });
    }catch(err){
      showToast("Couldn't read that file — is it a valid backup?");
    }
  };
  reader.readAsText(file);
}

function exportCsv(){
  var list = filteredTransactions();
  if(list.length === 0){ showToast("No transactions to export"); return; }
  var rows = [["Date","Type","Description","Notes","Category","Subcategory","Account/From","To","Amount","Currency"]];
  list.slice().sort(function(a,b){ return a.date.localeCompare(b.date); }).forEach(function(t){
    var cur = "USD", from="", to="";
    if(t.type === "transfer"){
      var fr = entityRef(t.fromType,t.fromId), toR = entityRef(t.toType,t.toId);
      from = fr?fr.name:""; to = toR?toR.name:""; cur = fr?fr.currency:"USD";
    } else if(t.linkId){
      // Cross-currency linked transfer pair (stored as expense/income, not "transfer")
      var acc = findAccount(t.account);
      from = acc?acc.name:""; cur = acc?acc.currency:"USD";
      var otherRow = DB.transactions.find(function(x){ return x.linkId===t.linkId && x.id!==t.id; });
      var otherAcc = otherRow ? findAccount(otherRow.account) : null;
      to = otherAcc ? otherAcc.name : "";
    } else {
      var acc2 = findAccount(t.account);
      from = acc2?acc2.name:""; cur = acc2?acc2.currency:"USD";
    }
    rows.push([t.date, t.linkId ? "transfer (cross-currency)" : t.type, t.desc||"", t.notes||"", t.category?categoryName(t.category):"", t.subcategory?subcatName(t.category,t.subcategory):"", from, to, t.amount.toFixed(2), cur]);
  });
  var csv = rows.map(function(r){
    return r.map(function(cell){
      var s = String(cell);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
    }).join(",");
  }).join("\n");
  var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "ledger-export-" + todayISO() + ".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============================================================
   EVENT WIRING (per-page, called after every render)
   ============================================================ */
function wirePageEvents(){
  document.getElementById("newTxBtn").onclick = function(){ openTxModal(null); };

  if(currentPage === "overview"){
    var navLink = document.querySelector("[data-nav-link]");
    if(navLink) navLink.addEventListener("click", function(){ navigateTo(navLink.getAttribute("data-nav-link")); });
    wireTxRowActions();
  }

  if(currentPage === "register"){
    wireTxRowActions();
    ["fAccount","fCurrency","fCategory","fSubcategory","fType","fDatePreset"].forEach(function(id){
      var el = document.getElementById(id);
      if(!el) return;
      el.addEventListener("change", function(){
        registerFilters.account = document.getElementById("fAccount").value;
        registerFilters.currency = document.getElementById("fCurrency").value;
        registerFilters.category = document.getElementById("fCategory").value;
        registerFilters.subcategory = document.getElementById("fSubcategory").value;
        registerFilters.type = document.getElementById("fType").value;
        registerFilters.datePreset = document.getElementById("fDatePreset").value;
        if(id === "fCategory") registerFilters.subcategory = "all";
        renderPage();
      });
    });
    var dFrom = document.getElementById("fDateFrom"), dTo = document.getElementById("fDateTo");
    if(dFrom) dFrom.addEventListener("change", function(){ registerFilters.dateFrom = dFrom.value; renderPage(); });
    if(dTo) dTo.addEventListener("change", function(){ registerFilters.dateTo = dTo.value; renderPage(); });
    var exportBtn = document.getElementById("exportCsvBtn");
    if(exportBtn) exportBtn.addEventListener("click", exportCsv);
  }

  if(currentPage === "accounts"){
    document.getElementById("addAcctBtn").addEventListener("click", function(){ openAccountModal(null); });
    Array.prototype.forEach.call(document.querySelectorAll("[data-edit-acct]"), function(b){
      b.addEventListener("click", function(){ openAccountModal(findAccount(b.getAttribute("data-edit-acct"))); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-del-acct]"), function(b){
      b.addEventListener("click", function(){
        var id = b.getAttribute("data-del-acct");
        var used = DB.transactions.some(function(t){ return t.account===id || (t.fromType==="account"&&t.fromId===id) || (t.toType==="account"&&t.toId===id); });
        if(used){
          openConfirmModal("Delete account?", "This account has transactions linked to it. Deleting it will not delete those transactions, but they'll show as referencing a missing account. Continue?", function(){
            DB.accounts = DB.accounts.filter(function(a){ return a.id!==id; }); saveData(); renderPage(); showToast("Account deleted");
          });
        } else {
          DB.accounts = DB.accounts.filter(function(a){ return a.id!==id; }); saveData(); renderPage(); showToast("Account deleted");
        }
      });
    });
  }

  if(currentPage === "people"){
    document.getElementById("addPersonBtn").addEventListener("click", function(){ openPersonModal(null); });
    Array.prototype.forEach.call(document.querySelectorAll("[data-edit-person]"), function(b){
      b.addEventListener("click", function(){ openPersonModal(findPerson(b.getAttribute("data-edit-person"))); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-del-person]"), function(b){
      b.addEventListener("click", function(){
        var id = b.getAttribute("data-del-person");
        openConfirmModal("Delete person?", "Existing transfers referencing them will remain but show as a missing person. Continue?", function(){
          DB.people = DB.people.filter(function(p){ return p.id!==id; }); saveData(); renderPage(); showToast("Person deleted");
        });
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-mark-paid]"), function(b){
      b.addEventListener("click", function(){
        var debtId = b.getAttribute("data-mark-paid");
        var d = DB.debtItems.find(function(x){ return x.id === debtId; });
        if(!d) return;
        openMarkPaidModal(d);
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll(".assign-pending-sel"), function(sel){
      sel.addEventListener("change", function(){
        var debtId = sel.getAttribute("data-debt-id");
        var personId = sel.value;
        if(!personId) return;
        var d = DB.debtItems.find(function(x){ return x.id === debtId; });
        if(d){
          d.personId = personId;
          d.status = "open";
          saveData();
          renderPage();
          showToast("Assigned to " + ((findPerson(personId)||{}).name||"person"));
        }
      });
    });
  }

  if(currentPage === "reports"){
    var mp = document.getElementById("monthPicker");
    if(mp) mp.addEventListener("change", function(){ reportState.month = mp.value; renderPage(); });
    Array.prototype.forEach.call(document.querySelectorAll("[data-chartmode]"), function(b){
      b.addEventListener("click", function(){ reportState.chartMode = b.getAttribute("data-chartmode"); renderPage(); });
    });
    var dlBackup = document.getElementById("downloadBackupBtn");
    if(dlBackup) dlBackup.addEventListener("click", exportBackup);
  }

  if(currentPage === "recurring"){
    document.getElementById("addRecurringBtn").addEventListener("click", function(){
      var name = document.getElementById("rName").value.trim();
      var amount = parseFloat(document.getElementById("rAmount").value);
      var frequency = document.getElementById("rFrequency").value;
      var startDate = document.getElementById("rStartDate").value;
      var type = document.getElementById("rType").value;
      var account = document.getElementById("rAccount").value;
      if(!name || !amount || amount<=0 || !startDate || !account){ showToast("Fill in all fields"); return; }
      DB.recurring.push({ id:uid(), name:name, amount:amount, frequency:frequency, startDate:startDate, type:type, account:account });
      saveData(); renderPage(); showToast("Recurring item added");
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-confirm-recurring]"), function(b){
      b.addEventListener("click", function(){
        var id = b.getAttribute("data-confirm-recurring");
        var r = DB.recurring.find(function(x){ return x.id===id; });
        if(!r) return;
        var acc = findAccount(r.account);
        DB.transactions.push({
          id:uid(), type:r.type, date:todayISO(), amount:r.amount, desc:r.name,
          notes:"Posted from recurring item", account:r.account, category:"", subcategory:"", created:Date.now()
        });
        // Advance the anchor date so the next due date computes correctly from here
        if(r.frequency === "weekly" || r.frequency === "biweekly"){
          var step = r.frequency === "weekly" ? 7 : 14;
          var d = new Date(r.startDate + "T00:00:00");
          while(d <= new Date(todayISO()+"T00:00:00")){ d.setDate(d.getDate() + step); }
          r.startDate = todayISOFromDate(d);
        } else {
          // monthly: just bump the anchor to next month, same day-of-month
          var d2 = new Date(r.startDate + "T00:00:00");
          d2.setMonth(d2.getMonth() + 1);
          r.startDate = todayISOFromDate(d2);
        }
        saveData(); renderPage(); showToast(r.name + " posted to " + (acc?acc.name:"account"));
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-del-recurring]"), function(b){
      b.addEventListener("click", function(){
        var id = b.getAttribute("data-del-recurring");
        DB.recurring = DB.recurring.filter(function(r){ return r.id!==id; }); saveData(); renderPage();
      });
    });
  }

  if(currentPage === "settings"){
    document.getElementById("addCatBtnExpense").addEventListener("click", function(){
      var input = document.getElementById("newCatNameExpense");
      var name = input.value.trim();
      if(!name){ showToast("Enter a category name"); return; }
      DB.categories.push({ id:uid(), name:name, type:"expense", subs:[] });
      saveData(); renderPage(); showToast("Expense category added");
    });
    document.getElementById("addCatBtnIncome").addEventListener("click", function(){
      var input = document.getElementById("newCatNameIncome");
      var name = input.value.trim();
      if(!name){ showToast("Enter a category name"); return; }
      DB.categories.push({ id:uid(), name:name, type:"income", subs:[] });
      saveData(); renderPage(); showToast("Income category added");
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-rename-cat]"), function(b){
      b.addEventListener("click", function(){
        var c = findCategory(b.getAttribute("data-rename-cat"));
        openTextPromptModal("Rename category", "Category name", c.name, function(v){ c.name=v; saveData(); renderPage(); });
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-del-cat]"), function(b){
      b.addEventListener("click", function(){
        var id = b.getAttribute("data-del-cat");
        openConfirmModal("Delete category?", "Transactions using this category will keep their data but show as uncategorized. Continue?", function(){
          DB.categories = DB.categories.filter(function(c){ return c.id!==id; }); saveData(); renderPage();
        });
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-add-sub]"), function(b){
      b.addEventListener("click", function(){
        var c = findCategory(b.getAttribute("data-add-sub"));
        openTextPromptModal("Add subcategory to " + c.name, "Subcategory name", "", function(v){
          c.subs.push({ id:uid(), name:v }); saveData(); renderPage();
        });
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-rename-sub]"), function(b){
      b.addEventListener("click", function(){
        var parts = b.getAttribute("data-rename-sub").split("|");
        var c = findCategory(parts[0]); var s = c.subs.find(function(x){return x.id===parts[1];});
        openTextPromptModal("Rename subcategory", "Subcategory name", s.name, function(v){ s.name=v; saveData(); renderPage(); });
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-del-sub]"), function(b){
      b.addEventListener("click", function(){
        var parts = b.getAttribute("data-del-sub").split("|");
        var c = findCategory(parts[0]);
        c.subs = c.subs.filter(function(x){ return x.id!==parts[1]; });
        saveData(); renderPage();
      });
    });

    document.getElementById("exportBackupBtn").addEventListener("click", exportBackup);
    document.getElementById("importBackupBtn").addEventListener("click", function(){ document.getElementById("importBackupFile").click(); });
    document.getElementById("importBackupFile").addEventListener("change", function(e){
      if(e.target.files[0]) importBackupFile(e.target.files[0]);
      e.target.value = "";
    });
    document.getElementById("importCsvBtn").addEventListener("click", function(){ document.getElementById("importCsvFile").click(); });
    document.getElementById("importCsvFile").addEventListener("change", function(e){
      if(e.target.files[0]) openCsvImportModal(e.target.files[0]);
      e.target.value = "";
    });
    document.getElementById("importStatementBtn").addEventListener("click", function(){ openStatementPasteModal(); });
    document.getElementById("resetAllBtn").addEventListener("click", function(){
      openConfirmModal(
        "Reset all data?",
        "This will permanently delete all accounts, transactions, people, categories and recurring items from this browser. Export a backup first if you want to keep anything. This cannot be undone.",
        function(){
          var fresh = defaultData();
          DB.accounts = fresh.accounts;
          DB.people = fresh.people;
          DB.transactions = fresh.transactions;
          DB.categories = fresh.categories;
          DB.recurring = fresh.recurring;
          DB.importMappings = fresh.importMappings;
          saveData();
          navigateTo("overview");
          showToast("All data cleared — fresh start");
        }
      );
    });
  }
}

function wireTxRowActions(){
  Array.prototype.forEach.call(document.querySelectorAll("[data-edit-tx]"), function(b){
    b.addEventListener("click", function(){
      var t = DB.transactions.find(function(x){ return x.id === b.getAttribute("data-edit-tx"); });
      if(t) openTxModal(t);
    });
  });
  Array.prototype.forEach.call(document.querySelectorAll("[data-del-tx]"), function(b){
    b.addEventListener("click", function(){
      var id = b.getAttribute("data-del-tx");
      var t = DB.transactions.find(function(x){ return x.id === id; });
      var isLinked = t && t.linkId;
      var msg = isLinked
        ? "This is one half of a cross-currency transfer. Deleting it will remove both linked entries. This can't be undone."
        : "This can't be undone.";
      openConfirmModal("Delete transaction?", msg, function(){
        if(isLinked){
          DB.transactions = DB.transactions.filter(function(x){ return x.linkId !== t.linkId; });
        } else {
          DB.transactions = DB.transactions.filter(function(x){ return x.id!==id; });
        }
        saveData(); renderPage(); showToast(isLinked ? "Both linked entries deleted" : "Transaction deleted");
      });
    });
  });
}

  document.getElementById("sidebarBackdrop").classList.add("show");
});
document.getElementById("sidebarBackdrop").addEventListener("click", function(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarBackdrop").classList.remove("show");
});

});

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0E1116">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="./css/styles.css?v=34">
</head>
<body data-theme="dark">

<div class="mobile-topbar">
  <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">&#9776;</button>
  <div class="brand">Ledger</div>
  <div style="width:38px;"></div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">Ledger<span class="sub">Personal register</span></div>
    <nav class="nav-list" id="navList"></nav>
    <div class="sidebar-footer">
      <span class="faint" style="font-size:11px;">Theme</span>
      <div class="theme-toggle">
        <button data-theme-btn="light">Light</button>
        <button data-theme-btn="dark" class="active">Dark</button>
      </div>
    </div>
  </aside>

  <div class="main-col">
    <div class="topbar">
      <div>
        <div class="page-title" id="pageTitle">Overview</div>
        <div class="page-subtitle" id="pageSubtitle"></div>
      </div>
      <div class="topbar-actions">
        <div class="search-box" id="globalSearchWrap" style="display:none;">
          <span class="ic">&#9906;</span>
          <input type="text" id="globalSearch" placeholder="Search transactions...">
        </div>
      </div>
    </div>
    <div class="content" id="pageContent"></div>
    <button class="btn btn-primary fab" id="newTxBtn">+ New transaction</button>
    <footer class="app-footer">Stored locally in this browser only · works fully offline</footer>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<!-- Core modules (load in dependency order) -->
<script src="./js/constants.js?v=3"></script>
<script src="./js/utils.js?v=4"></script>
<script src="./js/services/storage.js?v=1"></script>
<script src="./js/store.js?v=6"></script>
<script src="./js/modals.js?v=5"></script>
<script src="./js/modals/entity-modals.js?v=8"></script>
<script src="./js/components/transaction-row.js?v=3"></script>
<script src="./js/components/custom-dropdown.js?v=2"></script>

<!-- Pages -->
<script src="./js/pages/overview.js?v=3"></script>
<script src="./js/pages/register.js?v=7"></script>
<script src="./js/pages/accounts.js?v=3"></script>
<script src="./js/pages/categories.js?v=2"></script>
<script src="./js/pages/people.js?v=3"></script>
<script src="./js/pages/reports.js?v=5"></script>
<script src="./js/pages/recurring.js?v=3"></script>
<script src="./js/pages/settings.js?v=2"></script>

<!-- Services -->
<script src="./js/services/backup.js?v=3"></script>
<script src="./js/services/csv-import.js?v=8"></script>
<script src="./js/services/import-preview.js?v=8"></script>

<!-- App entry point (must be last) -->
<script src="./js/app.js?v=6"></script>

</body>
</html>
